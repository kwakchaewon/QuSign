spring:
  datasource:
    url: jdbc:mariadb://localhost:3306/qusign?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Seoul
    username: root
    password: root

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true

  flyway:
    clean-on-validation-error: false

storage:
  endpoint: http://localhost:9000
  bucket: qusign
  access-key: minioadmin
  secret-key: minioadmin

logging:
  level:
    com.qusign: DEBUG
    org.springframework.security: DEBUG
    org.hibernate.SQL: DEBUG
    org.flywaydb: DEBUG
